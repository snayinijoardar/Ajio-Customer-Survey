<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - AJIO Survey</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;

    background:
    linear-gradient(rgba(0,0,40,0.75),
    rgba(0,0,40,0.75)),
    url('ajio-bg.png');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.thankyou-card{
    background:#ffffff;
    width:90%;
    max-width:850px;
    padding:60px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
    width:110px;
    margin-bottom:25px;
}

h1{
    color:#082d7d;
    font-size:54px;
    margin-bottom:25px;
    font-weight:700;
}

.message{
    color:#444;
    font-size:28px;
    line-height:1.8;
    margin-bottom:30px;
}

.footer{
    margin-top:20px;
    color:#082d7d;
    font-size:22px;
    font-weight:600;
}

@media(max-width:768px){

.thankyou-card{
    padding:35px 25px;
}

.logo{
    width:85px;
}

h1{
    font-size:38px;
}

.message{
    font-size:20px;
}

.footer{
    font-size:18px;
}

}
</style>
</head>

<body>

<div class="thankyou-card">

    <!-- AJIO LOGO -->
    <img src="ajio-logo.png" alt="AJIO Logo" class="logo">

    <h1>Thank You!</h1>

    <div class="message">
        Your response has been submitted successfully.<br><br>

    </div>

    <div class="footer">
       Thank you for helping us create a better AJIO experience.❤️ 
    </div>

</div>

</body>
</html>
