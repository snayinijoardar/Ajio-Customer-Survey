<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You - AJIO Survey</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(rgba(0,0,0,.55), rgba(0,0,0,.55)),
    url('ajio-bg.png.png');
    background-size:cover;
    background-position:center;
    padding:20px;
}

.thankyou-card{
    background:#fff;
    width:100%;
    max-width:700px;
    padding:60px 40px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 15px 40px rgba(0,0,0,0.25);
}

.logo{
    width:90px;
    margin-bottom:20px;
}

.tick{
    width:90px;
    height:90px;
    margin:0 auto 25px;
    background:#28a745;
    color:#fff;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:50px;
    font-weight:bold;
}

h1{
    color:#0b2f7a;
    font-size:42px;
    margin-bottom:15px;
}

.message{
    color:#555;
    font-size:18px;
    line-height:1.8;
}

.footer{
    margin-top:30px;
    color:#0b2f7a;
    font-weight:600;
    font-size:16px;
}
</style>
</head>

<body>

<div class="thankyou-card">

    <img src="ajio-logo.png.png" alt="AJIO Logo" class="logo">

    <div class="tick">✓</div>

    <h1>Thank You!</h1>

    <div class="message">
        Your response has been submitted successfully.<br><br>
        We sincerely appreciate you taking the time to share your feedback.<br>
        Your valuable suggestions will help us improve and enhance the AJIO shopping experience.
    </div>

    <div class="footer">
        ❤️ Thank you for helping us create a better AJIO experience.
    </div>

</div>

</body>
</html>
